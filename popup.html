<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeWatch</title>
  <style>
    *,
    *::before,
    *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 220px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e2e8f0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    header img { width: 24px; height: 24px; }

    header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f8fafc;
    }

    #status-tag {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 20px;
      background: #22c55e22;
      color: #22c55e;
    }

    #status-tag.warn  { background: #f97316; color: #fff; }
    #status-tag.alert { background: #ef4444; color: #fff; }

    main { padding: 14px 16px 16px; }

    #loading,
    .empty-state {
      padding: 20px 4px;
      text-align: center;
      color: #64748b;
      line-height: 1.5;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .primary-action {
      margin-bottom: 16px;
    }

    .metric-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .metric-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px;
    }

    .metric-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }

    .metric-label {
      font-size: 12px;
      font-weight: 700;
      color: #f8fafc;
    }

    .metric-values {
      font-size: 12px;
      color: #fca5a5;
      font-weight: 600;
      text-align: right;
    }

    .metric-meta {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      margin: 0;
      min-height: 0;
      line-height: 1.1;
      font-family: inherit;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.88; }
    button:active { opacity: 0.75; }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #btn-show-hud { background: #2563eb; color: #fff; }
    .btn-increase { background: #f97316; color: #fff; }
    #btn-opts {
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 500;
    }
  </style>
</head>
<body>

<header>
  <img src="icons/icon48.png" alt="EdgeWatch icon" />
  <h1>EdgeWatch</h1>
  <span id="status-tag">OK</span>
</header>

<main>
  <div id="loading">Loading…</div>

  <div id="content" hidden>
    <div class="primary-action">
      <button id="btn-show-hud" type="button">Show HUD on page</button>
    </div>

    <div class="section-label">Metrics Over Limit</div>
    <div id="exceeded-list" class="metric-list"></div>

    <div class="actions">
      <button id="btn-opts" type="button">Open Options</button>
    </div>
  </div>
</main>

<script src="popup.js"></script>
</body>
</html>
